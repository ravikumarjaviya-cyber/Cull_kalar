<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monika Play - Custom Placement</title>
    <style>
        body { background-color: #121213; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 0; touch-action: none; overflow: hidden; }
        .header { margin-top: 15px; font-size: 24px; font-weight: bold; color: #FFCC00; }
        #grid { 
            display: grid; grid-template-columns: repeat(8, 42px); grid-template-rows: repeat(8, 42px); 
            gap: 4px; background-color: #1a1a1b; padding: 10px; border-radius: 12px;
            margin: 10px auto; width: fit-content; border: 2px solid #333; position: relative;
        }
        .cell { width: 42px; height: 42px; background-color: #2c2c2e; border-radius: 6px; }
        .filled { background-color: #ff007f !important; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        #pieces-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; height: 140px; }
        .piece { position: relative; display: grid; gap: 3px; cursor: grab; z-index: 5; }
        .p-block { width: 35px; height: 35px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">SCORE: <span id="score">0</span></div>
    <div id="grid"></div>
    <div id="pieces-container"></div>

    <script>
        const gridElement = document.getElementById('grid');
        const piecesContainer = document.getElementById('pieces-container');
        const scoreElement = document.getElementById('score');
        let score = 0;
        let gridState = Array(64).fill(false);

        const shapes = [
            {data: [[1, 1], [1, 1]], color: '#00E5FF'},
            {data: [[1, 1, 1]], color: '#FFCC00'},
            {data: [[1], [1], [1]], color: '#A855F7'},
            {data: [[1, 0], [1, 0], [1, 1]], color: '#4ADE80'},
            {data: [[1]], color: '#FF007F'}
        ];

        function createGrid() {
            gridElement.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.id = `cell-${i}`;
                gridElement.appendChild(cell);
            }
        }

        function createPieces() {
            piecesContainer.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const shapeRef = shapes[Math.floor(Math.random() * shapes.length)];
                const pieceObj = document.createElement('div');
                pieceObj.classList.add('piece');
                pieceObj.style.gridTemplateColumns = `repeat(${shapeRef.data[0].length}, 38px)`;
                
                shapeRef.data.forEach(row => {
                    row.forEach(val => {
                        const b = document.createElement('div');
                        if (val) {
                            b.classList.add('p-block');
                            b.style.backgroundColor = shapeRef.color;
                        }
                        pieceObj.appendChild(b);
                    });
                });

                addTouchEvents(pieceObj, shapeRef.data);
                piecesContainer.appendChild(pieceObj);
            }
        }

        function addTouchEvents(piece, shape) {
            let startX, startY;

            piece.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                const rect = piece.getBoundingClientRect();
                startX = touch.clientX - rect.left;
                startY = touch.clientY - rect.top;
                piece.style.zIndex = "100";
            }, {passive: false});

            piece.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                piece.style.position = 'fixed';
                piece.style.left = (touch.clientX - startX) + 'px';
                piece.style.top = (touch.clientY - startY) + 'px';
            }, {passive: false});

            piece.addEventListener('touchend', (e) => {
                const touch = e.changedTouches[0];
                piece.style.display = 'none';
                // आपकी उंगली के ठीक नीचे वाले एलिमेंट को पहचानना
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                piece.style.display = 'grid';

                if (target && target.classList.contains('cell')) {
                    const id = parseInt(target.id.split('-')[1]);
                    // यहाँ चेक होगा कि क्या आपकी चुनी हुई जगह खाली है
                    if (canPlace(id, shape)) {
                        placeShape(id, shape);
                        piece.remove();
                        checkLines();
                        if (piecesContainer.children.length === 0) createPieces();
                    } else {
                        resetPiece(piece);
                    }
                } else {
                    resetPiece(piece);
                }
            });
        }

        function resetPiece(piece) {
            piece.style.position = 'relative';
            piece.style.left = '0';
            piece.style.top = '0';
            piece.style.transform = 'none';
        }

        function canPlace(id, shape) {
            let rStart = Math.floor(id / 8);
            let cStart = id % 8;
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        let idx = (rStart + r) * 8 + (cStart + c);
                        if (rStart + r >= 8 || cStart + c >= 8 || gridState[idx]) return false;
                    }
                }
            }
            return true;
        }

        function placeShape(id, shape) {
            let rStart = Math.floor(id / 8);
            let cStart = id % 8;
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) gridState[(rStart + r) * 8 + (cStart + c)] = true;
                }
            }
            updateUI();
        }

        function checkLines() {
            let toClear = [];
            for(let i=0; i<8; i++){
                let rFull=true, cFull=true;
                for(let j=0; j<8; j++){
                    if(!gridState[i*8+j]) rFull=false;
                    if(!gridState[j*8+i]) cFull=false;
                }
                if(rFull) for(let j=0; j<8; j++) toClear.push(i*8+j);
                if(cFull) for(let j=0; j<8; j++) toClear.push(j*8+i);
            }
            toClear.forEach(idx => gridState[idx] = false);
            if(toClear.length > 0) {
                score += toClear.length * 10;
                scoreElement.innerText = score;
                updateUI();
            }
        }

        function updateUI() {
            gridState.forEach((val, i) => {
                const cell = document.getElementById(`cell-${i}`);
                cell.className = val ? 'cell filled' : 'cell';
            });
        }

        createGrid();
        createPieces();
    </script>
</body>
</html>
