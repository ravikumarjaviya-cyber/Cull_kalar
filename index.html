<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monika Play - Ultra Pro</title>
    <style>
        :root { --primary: #ff007f; --secondary: #00E5FF; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: white; text-align: center; 
            font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* --- Loading / Splash Screen --- */
        #splash-screen {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9000;
            transition: opacity 0.8s ease;
        }
        .loader-logo { font-size: 50px; font-weight: 900; color: var(--primary); text-shadow: 0 0 30px var(--primary); animation: glow 1.5s infinite alternate; }
        .loader-bar { width: 200px; height: 4px; background: #222; border-radius: 10px; margin-top: 30px; overflow: hidden; }
        .loader-progress { width: 0%; height: 100%; background: var(--primary); transition: width 0.2s; box-shadow: 0 0 10px var(--primary); }
        
        @keyframes glow { from { opacity: 0.5; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* --- Home Screen --- */
        #home-screen {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; padding: 20px;
        }
        .logo-main { font-size: 42px; font-weight: 900; color: var(--primary); text-shadow: 0 0 15px var(--primary); margin-bottom: 40px; }
        
        .mode-card {
            width: 100%; max-width: 320px; padding: 30px; border-radius: 25px; margin-bottom: 25px;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid rgba(255,255,255,0.05); position: relative;
            opacity: 0; transform: translateY(30px);
        }
        .show-card { opacity: 1; transform: translateY(0); }
        
        .card-classic { background: linear-gradient(145deg, #1a000d, #33001a); border-bottom: 4px solid var(--primary); }
        .card-level { background: linear-gradient(145deg, #000d1a, #001a33); border-bottom: 4px solid var(--secondary); }
        
        .mode-card:active { transform: scale(0.92); }
        .mode-card h2 { margin: 0; font-size: 26px; }
        .mode-card p { margin: 10px 0 0; font-size: 14px; color: #888; }

        /* --- Game Board Style --- */
        .header { display: none; padding: 20px; border-bottom: 1px solid #222; background: rgba(0,0,0,0.5); }
        #game-area { display: none; flex: 1; justify-content: center; align-items: center; padding: 15px; }
        #grid { 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; 
            background: #111; padding: 12px; border-radius: 18px;
            width: 100%; max-width: 380px; aspect-ratio: 1/1; border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .cell { background: rgba(255,255,255,0.03); border-radius: 6px; transition: 0.2s; }
        .filled { background-color: var(--b-col) !important; box-shadow: inset 0 0 10px rgba(255,255,255,0.2), 0 0 15px var(--g-col); }
        .is-bomb { background: #ffea00 !important; border-radius: 50% !important; animation: bombPulse 0.6s infinite; box-shadow: 0 0 25px #ffea00; }
        @keyframes bombPulse { 50% { transform: scale(1.1); filter: brightness(1.5); } }

        #pieces-container { display: none; height: 160px; justify-content: center; align-items: center; gap: 20px; background: rgba(0,0,0,0.3); }
        .piece { display: grid; gap: 3px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .p-block { width: 30px; height: 30px; border-radius: 5px; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; backdrop-filter: blur(5px); }
        .popup { background: #111; padding: 40px; border-radius: 30px; border: 1px solid #333; width: 85%; max-width: 400px; box-shadow: 0 0 40px var(--primary); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="loader-logo">MONIKA PLAY</div>
        <div class="loader-bar"><div class="loader-progress" id="lp"></div></div>
        <p style="margin-top: 15px; font-size: 12px; color: #444; letter-spacing: 2px;">LOADING ASSETS...</p>
    </div>

    <div id="home-screen">
        <div class="logo-main">MONIKA PLAY</div>
        
        <div class="mode-card card-classic" id="c1" onclick="start('classic')">
            <h2 style="color:var(--primary)">CLASSIC</h2>
            <p>स्कोर बनाएँ • हाई स्कोर: <span id="c-best">0</span></p>
        </div>

        <div class="mode-card card-level" id="c2" onclick="start('level')">
            <h2 style="color:var(--secondary)">LEVELS</h2>
            <p>मिशन • लेवल: <span id="l-best">1</span> • टारगेट मोड</p>
        </div>
    </div>

    <div class="header" id="head">
        <div id="m-title" style="font-weight:900; font-size: 22px; letter-spacing: 1px;">MODE</div>
        <div style="font-size: 14px; margin-top: 8px; opacity: 0.8;">Score: <span id="sc" style="font-weight:bold; color:#fff;">0</span> | <span id="gt">Target: 0</span></div>
    </div>

    <div id="game-area"><div id="grid"></div></div>
    <div id="pieces-container"></div>

    <div id="ovl" class="overlay">
        <div class="popup">
            <h1 id="ot" style="margin-top:0; color:var(--primary)">GAME OVER</h1>
            <p id="od" style="font-size: 18px; color: #aaa;">Score: 0</p>
            <button style="margin-top:20px; padding:15px 40px; border-radius:50px; background:var(--primary); color:white; border:none; font-weight:bold; width:100%;" onclick="location.reload()">HOME</button>
        </div>
    </div>

    <script>
        let score = 0, mode = 'classic', level = 1, target = 500, grid = Array(64).fill(null);
        let piecesData = [];
        const shapes = [
            {d:[[1,1],[1,1]]}, {d:[[1,1,1]]}, {d:[[1,1,1,1]]}, {d:[[1,1],[1,0]]}, 
            {d:[[1,1,1],[0,1,0]]}, {d:[[1,1,0],[0,1,1]]}, {d:[[1]]}, {d:[['B']]} 
        ];
        const cols = [{b:'#ff007f',g:'rgba(255,0,127,0.5)'},{b:'#00FF7F',g:'rgba(0,255,127,0.5)'},{b:'#00E5FF',g:'rgba(0,229,255,0.5)'},{b:'#FFD700',g:'rgba(255,215,0,0.5)'}];

        // Loading Logic
        window.onload = () => {
            let p = 0;
            let interval = setInterval(() => {
                p += Math.random() * 20;
                if(p > 100) p = 100;
                document.getElementById('lp').style.width = p + "%";
                if(p >= 100) {
                    clearInterval(interval);
                    setTimeout(showHome, 500);
                }
            }, 150);
        };

        function showHome() {
            document.getElementById('splash-screen').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = "none";
                document.getElementById('home-screen').style.display = "flex";
                document.getElementById('c-best').innerText = localStorage.getItem('monikaBest') || 0;
                document.getElementById('l-best').innerText = localStorage.getItem('monikaLevel') || 1;
                // Animate Cards
                setTimeout(() => document.getElementById('c1').classList.add('show-card'), 100);
                setTimeout(() => document.getElementById('c2').classList.add('show-card'), 300);
            }, 800);
        }

        function start(m) {
            mode = m;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('head').style.display = 'block';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('pieces-container').style.display = 'flex';
            
            if(mode === 'classic') {
                document.getElementById('m-title').innerText = "CLASSIC MODE";
                document.getElementById('m-title').style.color = 'var(--primary)';
                document.getElementById('gt').innerHTML = `Best: <b>${localStorage.getItem('monikaBest') || 0}</b>`;
            } else {
                level = 1; target = 500;
                updateLevelUI();
            }
            initGame();
        }

        function updateLevelUI() {
            document.getElementById('m-title').innerText = "LEVEL " + level;
            document.getElementById('m-title').style.color = 'var(--secondary)';
            document.getElementById('gt').innerHTML = `Target: <b style="color:var(--secondary)">${target}</b>`;
        }

        function initGame() {
            score = 0; grid.fill(null);
            document.getElementById('sc').innerText = "0";
            makeGrid(); makePieces();
        }

        function makeGrid() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=0; i<64; i++) {
                let c = document.createElement('div'); c.className = 'cell'; c.id = 'c-'+i;
                g.appendChild(c);
            }
        }

        function makePieces() {
            const cont = document.getElementById('pieces-container'); cont.innerHTML = '';
            for(let i=0; i<3; i++) {
                let s = shapes[Math.floor(Math.random()*shapes.length)];
                let c = cols[Math.floor(Math.random()*cols.length)];
                piecesData[i] = { s: JSON.parse(JSON.stringify(s.d)), c: c };
                let p = document.createElement('div'); p.className = 'piece'; p.id = 'p-'+i;
                drawP(p, piecesData[i].s, c);
                
                let lt = 0;
                p.addEventListener('touchstart', (e) => {
                    let now = Date.now();
                    if(now - lt < 300 && piecesData[i].s[0][0] !== 'B') { rotateP(i, p); e.preventDefault(); }
                    lt = now;
                });
                dragPiece(p, i);
                cont.appendChild(p);
            }
            checkEnd();
        }

        function drawP(el, sh, col) {
            el.innerHTML = ''; el.style.gridTemplateColumns = `repeat(${sh[0].length}, 30px)`;
            sh.forEach(r => r.forEach(v => {
                let b = document.createElement('div'); b.className = 'p-block';
                if(v === 'B') b.classList.add('is-bomb'); 
                else if(v) b.style.background = col.b; 
                else b.style.visibility = 'hidden';
                el.appendChild(b);
            }));
        }

        function rotateP(idx, el) {
            let s = piecesData[idx].s;
            piecesData[idx].s = s[0].map((_, c) => s.map(r => r[c]).reverse());
            drawP(el, piecesData[idx].s, piecesData[idx].c);
        }

        function dragPiece(p, idx) {
            let sx, sy;
            p.addEventListener('touchstart', (e) => { 
                let r = p.getBoundingClientRect(); sx = r.width/2; sy = r.height/2; 
                p.style.transform="scale(1.2) translateY(-20px)"; p.style.zIndex="1000";
            });
            p.addEventListener('touchmove', (e) => {
                e.preventDefault(); let t = e.touches[0];
                p.style.position = 'fixed'; p.style.left = (t.clientX - sx) + 'px'; p.style.top = (t.clientY - sy - 90) + 'px';
            });
            p.addEventListener('touchend', (e) => {
                let r = p.getBoundingClientRect(); p.style.display = 'none';
                let tar = document.elementFromPoint(r.left + 15, r.top + 15); p.style.display = 'grid';
                if(tar && tar.classList.contains('cell')) {
                    let id = parseInt(tar.id.split('-')[1]), row = Math.floor(id/8), col = id%8;
                    if(piecesData[idx].s[0][0] === 'B') { explode(row, col); p.remove(); finalizeTurn(); }
                    else if(canPlace(row, col, piecesData[idx].s)) { doPlace(row, col, piecesData[idx].s, piecesData[idx].c); p.remove(); finalizeTurn(); }
                    else resetP(p);
                } else resetP(p);
            });
        }

        function explode(r, c) {
            for(let i = r-1; i <= r+1; i++) for(let j = c-1; j <= c+1; j++) if(i>=0&&i<8&&j>=0&&j<8) grid[i*8+j] = null;
            score += 50; updateGridUI();
        }

        function canPlace(sr, sc, sh) {
            for(let r=0; r<sh.length; r++) for(let c=0; c<sh[r].length; c++) {
                if(sh[r][c]) { let cr=sr+r, cc=sc+c; if(cr>=8 || cc>=8 || grid[cr*8+cc]) return false; }
            } return true;
        }

        function doPlace(sr, sc, sh, col) {
            for(let r=0; r<sh.length; r++) for(let c=0; c<sh[r].length; c++) if(sh[r][c]) grid[(sr+r)*8+(sc+c)] = col;
            score += 10; checkLines(); updateGridUI();
        }

        function finalizeTurn() {
            if(document.getElementById('pieces-container').children.length === 0) makePieces();
            if(mode === 'level' && score >= target) {
                level++; target += 500;
                localStorage.setItem('monikaLevel', level);
                updateLevelUI();
                showPop("LEVEL UP! 🌟", "टारगेट पूरा हुआ! अगला लक्ष्य: " + target);
            }
        }

        function checkLines() {
            let rs=[], cs=[];
            for(let i=0; i<8; i++) {
                let rf=true, cf=true;
                for(let j=0; j<8; j++) { if(!grid[i*8+j]) rf=false; if(!grid[j*8+i]) cf=false; }
                if(rf) rs.push(i); if(cf) cs.push(i);
            }
            rs.forEach(r => { for(let j=0; j<8; j++) grid[r*8+j]=null; });
            cs.forEach(c => { for(let j=0; j<8; j++) grid[j*8+c]=null; });
            score += (rs.length + cs.length) * 100;
        }

        function updateGridUI() {
            document.getElementById('sc').innerText = score;
            grid.forEach((v, i) => {
                let c = document.getElementById('c-'+i);
                if(v) { c.classList.add('filled'); c.style.setProperty('--b-col', v.b); c.style.setProperty('--g-col', v.g); }
                else { c.classList.remove('filled'); }
            });
        }

        function showPop(t, d) {
            document.getElementById('ot').innerText = t; document.getElementById('od').innerText = d;
            document.getElementById('ovl').style.display = 'flex';
        }

        function checkEnd() {
            const ps = document.querySelectorAll('.piece'); let ok = false;
            ps.forEach(p => {
                let idx = parseInt(p.id.split('-')[1]), sh = piecesData[idx].s;
                if(sh[0][0] === 'B') ok = true;
                else for(let i=0; i<64; i++) if(canPlace(Math.floor(i/8), i%8, sh)) ok = true;
            });
            if(!ok && ps.length > 0) {
                if(mode==='classic' && score > (localStorage.getItem('monikaBest')||0)) localStorage.setItem('monikaBest', score);
                showPop("GAME OVER", "Final Score: " + score);
            }
        }

        function resetP(p) { p.style.position='relative'; p.style.left='0'; p.style.top='0'; p.style.transform="scale(1)"; p.style.zIndex="1"; }
    </script>
</body>
</html>
