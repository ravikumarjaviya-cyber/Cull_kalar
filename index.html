<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monika Play - Perfect Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #00FF7F;
            --bg-dark: #0a0a0b;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        /* लॉगिन और गेम ओवर ओवरले */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }

        .modal-box {
            background: rgba(30, 30, 35, 0.95);
            padding: 30px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%; max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* गेम हेडर */
        .header {
            padding: 20px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .title {
            font-size: 26px; font-weight: 800; letter-spacing: 3px;
            background: linear-gradient(45deg, var(--primary), #ff5f1f);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .stats-container {
            display: flex; justify-content: space-around; gap: 10px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 10px 20px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            flex: 1;
        }

        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 18px; font-weight: bold; color: #fff; }

        /* गेम बोर्ड */
        #game-area {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 10px;
        }

        #grid { 
            display: grid; grid-template-columns: repeat(8, 1fr);
            gap: 4px; background: rgba(255,255,255,0.03);
            padding: 8px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            width: 100%; max-width: 360px; aspect-ratio: 1/1;
        }

        .cell { 
            background: rgba(255,255,255,0.05); 
            border-radius: 6px; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .filled { 
            box-shadow: 0 0 15px var(--glow-color);
            background-color: var(--block-color) !important;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* ब्लॉक्स कंटेनर */
        #pieces-container {
            height: 140px;
            display: flex; justify-content: center; align-items: center;
            gap: 15px; padding-bottom: 20px;
        }

        .piece { display: grid; gap: 2px; transition: transform 0.1s; cursor: grab; }
        .p-block { border-radius: 4px; width: 30px; height: 30px; }

        /* बटन स्टाइल */
        .btn {
            width: 100%; padding: 15px; border-radius: 15px;
            border: none; font-weight: bold; font-size: 16px;
            cursor: pointer; margin-top: 10px; transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-fb { background: #1877F2; color: white; }
        .input-field {
            width: 100%; padding: 15px; border-radius: 12px;
            background: #222; border: 1px solid #333; color: white;
            margin-bottom: 10px; text-align: center;
        }

        #musicToggle {
            position: absolute; right: 20px; top: 25px;
            background: none; border: 1px solid rgba(255,255,255,0.2);
            color: white; border-radius: 50%; width: 40px; height: 40px;
        }
    </style>
</head>
<body>

    <div id="loginOverlay" class="overlay">
        <div class="modal-box">
            <div class="title">MONIKA PLAY</div>
            <p style="color:#888; margin-bottom: 20px;">अपना अकाउंट कंफर्म करें</p>
            <button class="btn btn-fb" onclick="doLogin('Facebook')">Facebook लॉगिन</button>
            <div style="margin: 15px 0; color: #555;">या</div>
            <input type="tel" id="phoneInput" class="input-field" placeholder="मोबाइल नंबर">
            <button class="btn btn-primary" onclick="doLogin('Phone')">लॉगिन करें</button>
        </div>
    </div>

    <div id="overOverlay" class="overlay">
        <div class="modal-box">
            <h1 style="color: var(--primary); margin: 0;">खेल समाप्त!</h1>
            <div style="margin: 20px 0;">
                <p class="stat-label">आपका स्कोर</p>
                <div id="finalScore" style="font-size: 40px; font-weight: 800;">0</div>
            </div>
            <button class="btn btn-primary" onclick="location.reload()">फिर से खेलें</button>
            <button onclick="logout()" style="background:none; border:none; color:#555; margin-top:15px; text-decoration: underline;">लॉगआउट</button>
        </div>
    </div>

    <div class="header">
        <button id="musicToggle" onclick="toggleMusic()">🔇</button>
        <div class="title">MONIKA PLAY</div>
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Best</div>
                <div id="highScore" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <div id="game-area">
        <div id="grid"></div>
    </div>

    <div id="pieces-container"></div>

    <script>
        const popSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); 
        bgMusic.loop = true; bgMusic.volume = 0.2;

        let score = 0, isGameOver = false, musicPlaying = false;
        let gridState = Array(64).fill(null);
        let currentPiecesData = [null, null, null];

        // लॉगिन चेक
        window.onload = () => {
            if (!localStorage.getItem('monikaLoggedIn')) {
                document.getElementById('loginOverlay').style.display = 'flex';
            } else {
                initGame();
            }
        };

        function doLogin(method) {
            if(method === 'Phone' && document.getElementById('phoneInput').value.length < 10) return alert("सही नंबर डालें");
            localStorage.setItem('monikaLoggedIn', 'true');
            document.getElementById('loginOverlay').style.display = 'none';
            initGame();
            toggleMusic();
        }

        function logout() { localStorage.clear(); location.reload(); }

        function initGame() {
            document.getElementById('highScore').innerText = localStorage.getItem('monikaBest') || 0;
            createGrid();
            createPieces();
        }

        const colors = [
            { bg: '#ff007f', glow: 'rgba(255, 0, 127, 0.6)' },
            { bg: '#00FF7F', glow: 'rgba(0, 255, 127, 0.6)' },
            { bg: '#00E5FF', glow: 'rgba(0, 229, 255, 0.6)' },
            { bg: '#FFD700', glow: 'rgba(255, 215, 0, 0.6)' },
            { bg: '#A855F7', glow: 'rgba(168, 85, 247, 0.6)' }
        ];

        const shapes = [
            {data:[[1,1],[1,1]]}, {data:[[1,1,1]]}, {data:[[1,1],[1,0]]}, 
            {data:[[1,0],[1,1]]}, {data:[[1,1,1],[0,1,0]]}, {data:[[1]]}
        ];

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<64; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell'; cell.id = 'cell-'+i;
                grid.appendChild(cell);
            }
        }

        function createPieces() {
            const container = document.getElementById('pieces-container');
            container.innerHTML = '';
            for(let i=0; i<3; i++) {
                let shape = shapes[Math.floor(Math.random()*shapes.length)];
                let color = colors[Math.floor(Math.random()*colors.length)];
                currentPiecesData[i] = { shape: shape.data, color: color };
                
                let p = document.createElement('div');
                p.className = 'piece'; p.setAttribute('data-idx', i);
                p.style.gridTemplateColumns = `repeat(${shape.data[0].length}, 30px)`;
                
                shape.data.forEach(row => row.forEach(v => {
                    let b = document.createElement('div');
                    if(v) { 
                        b.className = 'p-block'; 
                        b.style.background = color.bg; 
                        b.style.boxShadow = `0 0 10px ${color.glow}`;
                    } else b.style.visibility = 'hidden';
                    p.appendChild(b);
                }));
                addEvents(p, shape.data, color);
                container.appendChild(p);
            }
            checkOver();
        }

        function addEvents(p, sh, col) {
            let ox, oy;
            p.addEventListener('touchstart', (e) => {
                let t = e.touches[0]; let r = p.getBoundingClientRect();
                ox = t.clientX - r.left; oy = t.clientY - r.top;
                p.style.transform = "scale(1.4)"; p.style.zIndex = "100";
            });
            p.addEventListener('touchmove', (e) => {
                e.preventDefault(); let t = e.touches[0];
                p.style.position = 'fixed'; p.style.left = (t.clientX - ox)+'px'; p.style.top = (t.clientY - oy - 50)+'px';
            });
            p.addEventListener('touchend', (e) => {
                p.style.display = 'none';
                let t = e.changedTouches[0];
                let target = document.elementFromPoint(t.clientX, t.clientY);
                p.style.display = 'grid';
                if(target && target.classList.contains('cell')) {
                    let id = parseInt(target.id.split('-')[1]);
                    let r = Math.floor(id/8) - Math.floor(oy/40), c = (id%8) - Math.floor(ox/40);
                    if(canPlace(r, c, sh)) {
                        place(r, c, sh, col);
                        currentPiecesData[p.getAttribute('data-idx')] = null;
                        p.remove(); checkLines();
                        if(document.getElementById('pieces-container').children.length === 0) createPieces();
                        else checkOver();
                    } else reset(p);
                } else reset(p);
            });
        }

        function canPlace(sr, sc, sh) {
            for(let r=0; r<sh.length; r++) for(let c=0; c<sh[r].length; c++) {
                if(sh[r][c]) {
                    let cr = sr+r, cc = sc+c;
                    if(cr<0||cr>=8||cc<0||cc>=8||gridState[cr*8+cc]) return false;
                }
            } return true;
        }

        function place(sr, sc, sh, col) {
            for(let r=0; r<sh.length; r++) for(let c=0; c<sh[r].length; c++) {
                if(sh[r][c]) gridState[(sr+r)*8+(sc+c)] = col;
            } updateUI();
        }

        function checkLines() {
            let clear = [];
            for(let i=0; i<8; i++) {
                let rf=true, cf=true;
                for(let j=0; j<8; j++) { if(!gridState[i*8+j]) rf=false; if(!gridState[j*8+i]) cf=false; }
                if(rf) for(let j=0; j<8; j++) clear.push(i*8+j);
                if(cf) for(let j=0; j<8; j++) clear.push(j*8+i);
            }
            if(clear.length > 0) {
                popSound.play();
                [...new Set(clear)].forEach(i => gridState[i] = null);
                score += clear.length*10; document.getElementById('score').innerText = score;
                let newC = colors[Math.floor(Math.random()*colors.length)];
                gridState.forEach((v, i) => { if(v) gridState[i] = newC; });
                updateUI();
            }
        }

        function updateUI() {
            gridState.forEach((v, i) => {
                let cell = document.getElementById('cell-'+i);
                if(v) {
                    cell.className = 'cell filled';
                    cell.style.setProperty('--block-color', v.bg);
                    cell.style.setProperty('--glow-color', v.glow);
                } else cell.className = 'cell';
            });
        }

        function checkOver() {
            let possible = false;
            for(let p of currentPiecesData) {
                if(!p) continue;
                for(let r=-2; r<8; r++) for(let c=-2; c<8; c++) {
                    if(canPlace(r, c, p.shape)) { possible = true; break; }
                } if(possible) break;
            }
            if(!possible) {
                document.getElementById('finalScore').innerText = score;
                if(score > (localStorage.getItem('monikaBest')||0)) {
                    localStorage.setItem('monikaBest', score);
                    confetti({particleCount: 200});
                }
                document.getElementById('overOverlay').style.display = 'flex';
            }
        }

        function reset(p) { p.style.position='relative'; p.style.left='0'; p.style.top='0'; p.style.transform='scale(1)'; }
        function toggleMusic() {
            musicPlaying ? bgMusic.pause() : bgMusic.play();
            musicPlaying = !musicPlaying;
            document.getElementById('musicToggle').innerText = musicPlaying ? '🔊' : '🔇';
        }
    </script>
</body>
</html>
