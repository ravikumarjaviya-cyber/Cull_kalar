<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>बच्चों की पाठशाला</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #fff5f8; text-align: center; padding: 20px; }
        .section-title { background: #6c5ce7; color: white; padding: 15px; border-radius: 50px; margin: 30px auto; max-width: 400px; font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 15px; padding: 20px; max-width: 900px; margin: auto; }
        .card { 
            background: white; border: 4px solid #fdcb6e; border-radius: 20px; 
            padding: 25px 10px; font-size: 35px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 #fab1a0; transition: 0.2s;
        }
        .card:active { transform: translateY(5px); box-shadow: none; }
        .hindi-card { border-color: #55efc4; box-shadow: 0 5px 0 #00b894; }
    </style>
</head>
<body>

    <h1 style="color: #d63031; font-size: 40px;">मजेदार पढ़ाई 🎈</h1>

    <div class="section-title">A for Apple... 🍎</div>
    <div id="english-grid" class="grid"></div>

    <div class="section-title">अ से अनार... 🥭</div>
    <div id="hindi-grid" class="grid"></div>

    <script>
        // English शब्दों की लिस्ट
        const englishData = {
            'A': 'Apple', 'B': 'Ball', 'C': 'Cat', 'D': 'Dog', 'E': 'Elephant', 'F': 'Fish', 'G': 'Grapes', 'H': 'Hen', 'I': 'Ice Cream', 'J': 'Jug', 'K': 'Kite', 'L': 'Lion', 'M': 'Monkey', 'N': 'Nest', 'O': 'Orange', 'P': 'Peacock', 'Q': 'Queen', 'R': 'Rose', 'S': 'Swan', 'T': 'Tiger', 'U': 'Umbrella', 'V': 'Van', 'W': 'Watch', 'X': 'Xylophone', 'Y': 'Yacht', 'Z': 'Zebra'
        };

        // हिंदी शब्दों की लिस्ट
        const hindiData = {
            'अ': 'अनार', 'आ': 'आम', 'इ': 'इमली', 'ई': 'ईख', 'उ': 'उल्लू', 'ऊ': 'ऊन', 'ऋ': 'ऋषि', 'ए': 'एड़ी', 'ऐ': 'ऐनक', 'ओ': 'ओखली', 'औ': 'औरत', 'अं': 'अंगूर', 'अः': 'खाली',
            'क': 'कबूतर', 'ख': 'खरगोश', 'ग': 'गमला', 'घ': 'घड़ी', 'च': 'चरखा', 'छ': 'छतरी', 'ज': 'जहाज', 'झ': 'झंडा', 'ट': 'टमाटर', 'ठ': 'ठठेरा', 'ड': 'डमरू', 'ढ': 'ढक्कन', 'त': 'तरबूज', 'थ': 'थर्मस', 'द': 'दवात', 'ध': 'धनुष', 'न': 'नल', 'प': 'पतंग', 'फ': 'फल', 'ब': 'बकरी', 'भ': 'भालू', 'म': 'मछली', 'य': 'यज्ञ', 'र': 'रथ', 'ल': 'लट्टू', 'व': 'वकील', 'श': 'शलगम', 'ष': 'षटकोण', 'स': 'सपेरा', 'ह': 'हाथी', 'क्ष': 'क्षत्रिय', 'त्र': 'त्रिशूल', 'ज्ञ': 'ज्ञानी'
        };

        function createGrid(data, containerId, lang, isHindi) {
            const container = document.getElementById(containerId);
            for (let letter in data) {
                let div = document.createElement('div');
                div.className = isHindi ? 'card hindi-card' : 'card';
                div.innerText = letter;
                
                // बोलने का लॉजिक
                div.onclick = () => {
                    let word = data[letter];
                    let textToSpeak = isHindi ? `${letter} से ${word}` : `${letter} for ${word}`;
                    speak(textToSpeak, lang);
                };
                container.appendChild(div);
            }
        }

        function speak(text, lang) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = lang;
            msg.rate = 0.9; 
            window.speechSynthesis.speak(msg);
        }

        // ग्रिड्स लोड करें
        createGrid(englishData, 'english-grid', 'en-US', false);
        createGrid(hindiData, 'hindi-grid', 'hi-IN', true);
    </script>

</body>
</html>
