<!DOCTYPE html>
<html>
<head>
    <title>इस्कॉन बुक्स ऐप</title>
    <style>
        body { font-family: Arial; text-align: center; background-color: #fff5e6; }
        .book-card { border: 1px solid #d4a373; padding: 20px; margin: 10px; display: inline-block; border-radius: 10px; background: white; }
        button { background-color: #fb8500; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>हरे कृष्णा! इस्कॉन लाइब्रेरी</h1>
    
    <div class="book-card">
        <h3>भगवद गीता (यथारूप)</h3>
        <p>लेखक: श्रील प्रभुपाद</p>
        <button onclick="alert('किताब खुल रही है...')">पढ़ना शुरू करें</button>
    </div>

    <div class="book-card">
        <h3>ईशोपनिषद</h3>
        <p>आध्यात्मिक ज्ञान का सार</p>
        <button onclick="alert('किताब डाउनलोड हो रही है...')">डाउनलोड करें</button>
    </div>
</body>
</html>
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>मेरा लूडो गेम</title>
    <style>
        body { text-align: center; font-family: Arial; background-color: #f0f0f0; }
        #dice-box { 
            font-size: 50px; 
            width: 100px; height: 100px; 
            line-height: 100px; 
            background: white; 
            border: 3px solid #333; 
            margin: 20px auto; 
            border-radius: 15px; 
        }
        button { 
            padding: 10px 25px; 
            font-size: 20px; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <h1>लूडो गेम की शुरुआत 🎲</h1>
    <div id="dice-box">?</div>
    <button onclick="roll()">पासा फेंकें</button>
    <p id="message"></p>

    <script>
        function roll() {
            // 1 से 6 के बीच रैंडम नंबर
            let number = Math.floor(Math.random() * 6) + 1;
            
            // स्क्रीन पर नंबर दिखाना
            document.getElementById('dice-box').innerHTML = number;
            
            // अगर 6 आए तो खास मैसेज
            if(number === 6) {
                document.getElementById('message').innerText = "वाह! 6 आया, अब गोटी बाहर निकालो!";
                document.getElementById('message').style.color = "blue";
            } else {
                document.getElementById('message').innerText = "अगली बारी का इंतज़ार करें।";
                document.getElementById('message').style.color = "black";
            }
        }
    </script>

</body>
</html>
