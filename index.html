<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monika Play - Block Blast</title>
    <style>
        body { background-color: #121213; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 0; touch-action: none; overflow: hidden; }
        .header { margin-top: 20px; font-size: 28px; font-weight: bold; color: #FFCC00; }
        
        /* ग्रिड स्टाइल */
        #grid { 
            display: grid; grid-template-columns: repeat(8, 42px); grid-template-rows: repeat(8, 42px); 
            gap: 4px; background-color: #1a1a1b; padding: 10px; border-radius: 12px;
            margin: 20px auto; width: fit-content; border: 2px solid #333;
        }
        .cell { width: 42px; height: 42px; background-color: #2c2c2e; border-radius: 6px; }
        .filled { background-color: #ff007f !important; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        
        /* नीचे के ब्लॉक्स */
        #pieces-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; height: 140px; }
        .piece { position: relative; display: grid; gap: 3px; cursor: grab; transition: transform 0.1s; z-index: 5; }
        .p-block { width: 35px; height: 35px; border-radius: 5px; }

        /* गेम ओवर स्क्रीन */
        #game-over {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; justify-content: center; align-items: center;
        }
        button { background: #FFCC00; border: none; padding: 12px 25px; font-size: 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">SCORE: <span id="score">0</span></div>
    
    <div id="grid"></div>

    <div id="pieces-container"></div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>जगह खत्म हो गई है!</p>
        <button onclick="resetGame()">फिर से खेलें</button>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const piecesContainer = document.getElementById('pieces-container');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over');
        
        let score = 0;
        let gridState = Array(64).fill(false);

        // अलग-अलग शेप्स और उनके रंग
        const shapes = [
            {data: [[1, 1], [1, 1]], color: '#00E5FF'}, // Square
            {data: [[1, 1, 1]], color: '#FFCC00'},      // Row
            {data: [[1], [1], [1]], color: '#A855F7'},  // Col
            {data: [[1, 0], [1, 0], [1, 1]], color: '#4ADE80'}, // L-Shape
            {data: [[1]], color: '#FF007F'}              // Single
        ];

        function createGrid() {
            gridElement.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.id = `cell-${i}`;
                gridElement.appendChild(cell);
            }
        }

        function createPieces() {
            piecesContainer.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const shapeRef = shapes[Math.floor(Math.random() * shapes.length)];
                const pieceObj = document.createElement('div');
                pieceObj.classList.add('piece');
                pieceObj.style.gridTemplateColumns = `repeat(${shapeRef.data[0].length}, 38px)`;
                
                shapeRef.data.forEach(row => {
                    row.forEach(val => {
                        const b = document.createElement('div');
                        if (val) {
                            b.classList.add('p-block');
                            b.style.backgroundColor = shapeRef.color;
                        }
                        pieceObj.appendChild(b);
                    });
                });

                addTouchEvents(pieceObj, shapeRef.data);
                piecesContainer.appendChild(pieceObj);
            }
        }

        // मोबाइल टच सिस्टम (Touch Events)
        function addTouchEvents(piece, shape) {
            let startX, startY;

            piece.ontouchstart = (e) => {
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                piece.style.transition = 'none';
            };

            piece.ontouchmove = (e) => {
                const touch = e.touches[0];
                let dx = touch.clientX - startX;
                let dy = touch.clientY - startY;
                piece.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
            };

            piece.ontouchend = (e) => {
                const touch = e.changedTouches[0];
                piece.style.display = 'none'; // नीचे से हटाकर चेक करें
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                piece.style.display = 'grid';

                if (target && target.classList.contains('cell')) {
                    const id = parseInt(target.id.split('-')[1]);
                    if (canPlace(id, shape)) {
                        placeShape(id, shape);
                        piece.remove();
                        checkLines();
                        if (piecesContainer.children.length === 0) createPieces();
                    } else {
                        piece.style.transform = 'translate(0,0) scale(0.8)';
                    }
                } else {
                    piece.style.transform = 'translate(0,0) scale(0.8)';
                }
            };
        }

        function canPlace(id, shape) {
            let rStart = Math.floor(id / 8);
            let cStart = id % 8;
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        let idx = (rStart + r) * 8 + (cStart + c);
                        if (rStart + r >= 8 || cStart + c >= 8 || gridState[idx]) return false;
                    }
                }
            }
            return true;
        }

        function placeShape(id, shape) {
            let rStart = Math.floor(id / 8);
            let cStart = id % 8;
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) gridState[(rStart + r) * 8 + (cStart + c)] = true;
                }
            }
            updateUI();
        }

        function checkLines() {
            let rowsToClear = [], colsToClear = [];
            for(let i=0; i<8; i++) {
                let rFull=true, cFull=true;
                for(let j=0; j<8; j++) {
                    if(!gridState[i*8+j]) rFull=false;
                    if(!gridState[j*8+i]) cFull=false;
                }
                if(rFull) rowsToClear.push(i);
                if(cFull) colsToClear.push(i);
            }
            
            rowsToClear.forEach(r => { for(let c=0; c<8; c++) gridState[r*8+c] = false; score += 100; });
            colsToClear.forEach(c => { for(let r=0; r<8; r++) gridState[r*8+c] = false; score += 100; });
            
            scoreElement.innerText = score;
            updateUI();
        }

        function updateUI() {
            gridState.forEach((val, i) => {
                const cell = document.getElementById(`cell-${i}`);
                cell.className = val ? 'cell filled' : 'cell';
            });
        }

        function resetGame() {
            gridState.fill(false);
            score = 0;
            scoreElement.innerText = 0;
            gameOverScreen.style.display = 'none';
            updateUI();
            createPieces();
        }

        createGrid();
        createPieces();
    </script>
</body>
</html>
