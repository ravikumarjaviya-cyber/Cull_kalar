<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monika Play - Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --glow-color: #ff007f; --block-color: #ff007f; }
        body { background-color: #0f0f10; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 0; touch-action: none; overflow: hidden; }
        
        /* लॉगिन स्क्रीन */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121213; z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .login-box { background: #1a1a1b; padding: 30px; border-radius: 20px; border: 2px solid #333; width: 80%; max-width: 350px; }
        .fb-btn { background: #1877F2; color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        .phone-input { width: 90%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #222; color: white; margin-bottom: 10px; text-align: center; }
        .login-btn { background: #00FF7F; color: black; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* गेम हेडर */
        .header-container { padding: 15px; background: #161618; border-bottom: 2px solid #333; position: relative; }
        .score-box { display: flex; justify-content: space-around; font-size: 18px; font-weight: bold; }
        #musicToggle { position: absolute; right: 15px; top: 15px; background: #222; color: white; border: 1px solid #444; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; }

        /* ग्रिड और ब्लॉक्स */
        #grid { 
            display: grid; grid-template-columns: repeat(8, 42px); grid-template-rows: repeat(8, 42px); 
            gap: 4px; background-color: #1a1a1b; padding: 12px; border-radius: 15px;
            margin: 10px auto; width: fit-content; border: 3px solid #333;
        }
        .cell { width: 42px; height: 42px; background-color: #252527; border-radius: 8px; transition: 0.3s; }
        .filled { 
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: inset 0 0 8px rgba(0,0,0,0.5), 0 0 12px var(--glow-color);
            background-color: var(--block-color) !important;
        }
        
        #pieces-container { display: flex; justify-content: center; gap: 20px; margin-top: 15px; height: 120px; align-items: center; }
        .piece { position: relative; display: grid; gap: 3px; cursor: grab; z-index: 5; }
        .p-block { width: 30px; height: 30px; border-radius: 5px; pointer-events: none; }

        /* गेम ओवर */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .modal { background: #1a1a1b; padding: 40px; border-radius: 25px; border: 3px solid #ff007f; text-align: center; }
        .restart-btn { background: #00FF7F; color: black; padding: 12px 30px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:#ff007f;">MONIKA PLAY</h2>
            <button class="fb-btn" onclick="closeLogin('Facebook')">Facebook लॉगिन</button>
            <input type="tel" id="phone" class="phone-input" placeholder="मोबाइल नंबर">
            <button class="login-btn" onclick="closeLogin('Phone')">लॉगिन करें</button>
        </div>
    </div>

    <div class="header-container">
        <button id="musicToggle" onclick="toggleMusic()">🔇</button>
        <div style="font-size: 22px; color: #ff007f; font-weight: bold;">MONIKA PLAY ✨</div>
        <div class="score-box">
            <div><span style="color:#FFD700">SCORE:</span> <span id="score">0</span></div>
            <div><span style="color:#00FF7F">BEST:</span> <span id="highScore">0</span></div>
        </div>
    </div>

    <div id="grid"></div>
    <div id="pieces-container"></div>

    <div id="overlay">
        <div class="modal">
            <h1 style="color: #ff007f; margin: 0;">खेल समाप्त!</h1>
            <p style="font-size: 24px;">स्कोर: <span id="finalScore">0</span></p>
            <p id="highScoreMsg" style="color: #00FF7F; font-weight: bold; display:none;">🎉 नया रिकॉर्ड बना रवि! 🎉</p>
            <button class="restart-btn" onclick="location.reload()">फिर से खेलें</button>
        </div>
    </div>

    <script>
        const popSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const winSound = new Audio('https://actions.google.com/sounds/v1/foley/wind_chime.ogg');
        const bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); 
        bgMusic.loop = true; bgMusic.volume = 0.2;

        let score = 0, isGameOver = false, musicPlaying = false;
        let highScore = localStorage.getItem('monikaHighScore') || 0;
        let gridState = Array(64).fill(null);
        let currentPiecesData = [null, null, null];

        document.getElementById('highScore').innerText = highScore;

        const neonColors = [
            { bg: '#FF007F', glow: 'rgba(255, 0, 127, 0.7)' },
            { bg: '#00E5FF', glow: 'rgba(0, 229, 255, 0.7)' },
            { bg: '#00FF7F', glow: 'rgba(0, 255, 127, 0.7)' },
            { bg: '#FFD700', glow: 'rgba(255, 215, 0, 0.7)' },
            { bg: '#A855F7', glow: 'rgba(168, 85, 247, 0.7)' }
        ];

        const shapes = [
            {data: [[1, 1], [1, 1]]}, {data: [[1, 1, 1]]}, {data: [[1, 1], [1, 0]]},
            {data: [[1, 0], [1, 1]]}, {data: [[0, 1], [1, 1]]}, {data: [[1, 1, 1], [0, 1, 0]]},
            {data: [[1, 1, 0], [0, 1, 1]]}, {data: [[1]]}
        ];

        function closeLogin(type) {
            document.getElementById('loginOverlay').style.display = 'none';
            if(!musicPlaying) toggleMusic();
        }

        function toggleMusic() {
            const btn = document.getElementById('musicToggle');
            if (!musicPlaying) { bgMusic.play(); btn.innerText = "🔊"; musicPlaying = true; }
            else { bgMusic.pause(); btn.innerText = "🔇"; musicPlaying = false; }
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.id = `cell-${i}`;
                grid.appendChild(cell);
            }
        }

        function createPieces() {
            if(isGameOver) return;
            const container = document.getElementById('pieces-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const shapeRef = shapes[Math.floor(Math.random() * shapes.length)];
                const color = neonColors[Math.floor(Math.random() * neonColors.length)];
                currentPiecesData[i] = { shape: shapeRef.data, color: color };
                
                const pObj = document.createElement('div');
                pObj.classList.add('piece');
                pObj.setAttribute('data-index', i);
                pObj.style.gridTemplateColumns = `repeat(${shapeRef.data[0].length}, 30px)`;
                
                shapeRef.data.forEach(row => {
                    row.forEach(val => {
                        const b = document.createElement('div');
                        if(val) { b.classList.add('p-block'); b.style.backgroundColor = color.bg; b.style.boxShadow = `0 0 10px ${color.glow}`; }
                        else { b.style.visibility = 'hidden'; }
                        pObj.appendChild(b);
                    });
                });
                addTouchEvents(pObj, shapeRef.data, color);
                container.appendChild(pObj);
            }
            checkAutoGameOver();
        }

        function addTouchEvents(piece, shape, color) {
            let ox, oy;
            piece.addEventListener('touchstart', (e) => {
                if(isGameOver) return;
                const t = e.touches[0]; const r = piece.getBoundingClientRect();
                ox = t.clientX - r.left; oy = t.clientY - r.top;
                piece.style.zIndex = "100"; piece.style.transform = "scale(1.3)";
            });
            piece.addEventListener('touchmove', (e) => {
                if(isGameOver) return; e.preventDefault();
                const t = e.touches[0];
                piece.style.position = 'fixed';
                piece.style.left = (t.clientX - ox) + 'px'; piece.style.top = (t.clientY - oy) + 'px';
            });
            piece.addEventListener('touchend', (e) => {
                if(isGameOver) return;
                const t = e.changedTouches[0]; piece.style.display = 'none';
                const target = document.elementFromPoint(t.clientX, t.clientY);
                piece.style.display = 'grid';
                if (target && target.classList.contains('cell')) {
                    const id = parseInt(target.id.split('-')[1]);
                    let r = Math.floor(id / 8) - Math.floor(oy / 42), c = (id % 8) - Math.floor(ox / 42);
                    if (canPlace(r, c, shape)) {
                        placeShape(r, c, shape, color);
                        currentPiecesData[piece.getAttribute('data-index')] = null;
                        piece.remove(); checkLines();
                        if (document.getElementById('pieces-container').children.length === 0) createPieces();
                        else checkAutoGameOver();
                    } else resetPiece(piece);
                } else resetPiece(piece);
            });
        }

        function canPlace(sr, sc, sh) {
            for (let r = 0; r < sh.length; r++) {
                for (let c = 0; c < sh[r].length; c++) {
                    if (sh[r][c]) {
                        let cr = sr + r, cc = sc + c;
                        if (cr < 0 || cr >= 8 || cc < 0 || cc >= 8 || gridState[cr * 8 + cc]) return false;
                    }
                }
            }
            return true;
        }

        function placeShape(sr, sc, sh, col) {
            for (let r = 0; r < sh.length; r++) {
                for (let c = 0; c < sh[r].length; c++) {
                    if (sh[r][c]) gridState[(sr + r) * 8 + (sc + c)] = col;
                }
            }
            updateUI();
        }

        function checkLines() {
            let clear = [];
            for(let i=0; i<8; i++){
                let rf=true, cf=true;
                for(let j=0; j<8; j++){ if(!gridState[i*8+j]) rf=false; if(!gridState[j*8+i]) cf=false; }
                if(rf) for(let j=0; j<8; j++) clear.push(i*8+j);
                if(cf) for(let j=0; j<8; j++) clear.push(j*8+i);
            }
            let u = [...new Set(clear)];
            if(u.length > 0) {
                popSound.currentTime = 0; popSound.play();
                u.forEach(idx => gridState[idx] = null);
                score += u.length * 10; document.getElementById('score').innerText = score;
                const newCol = neonColors[Math.floor(Math.random() * neonColors.length)];
                gridState.forEach((v, i) => { if(v) gridState[i] = newCol; });
                updateUI();
            }
        }

        function updateUI() {
            gridState.forEach((v, i) => {
                const cell = document.getElementById(`cell-${i}`);
                if (v) { cell.classList.add('filled'); cell.style.setProperty('--block-color', v.bg); cell.style.setProperty('--glow-color', v.glow); }
                else { cell.classList.remove('filled'); }
            });
        }

        function checkAutoGameOver() {
            let possible = false;
            for (let p of currentPiecesData) {
                if (!p) continue;
                for (let r = -2; r < 8; r++) {
                    for (let c = -2; c < 8; c++) { if (canPlace(r, c, p.shape)) { possible = true; break; } }
                    if (possible) break;
                }
                if (possible) break;
            }
            if (!possible) setTimeout(triggerGameOver, 600);
        }

        function triggerGameOver() {
            if(isGameOver) return; isGameOver = true; bgMusic.pause();
            document.getElementById('finalScore').innerText = score;
            if (score > highScore) {
                localStorage.setItem('monikaHighScore', score);
                document.getElementById('highScoreMsg').style.display = 'block';
                winSound.play(); confetti({ particleCount: 200, spread: 80 });
            }
            document.getElementById('overlay').style.display = 'flex';
        }

        function resetPiece(p) { p.style.position = 'relative'; p.style.left = '0'; p.style.top = '0'; p.style.transform = 'scale(1)'; p.style.zIndex = "5"; }

        createGrid();
        createPieces();
    </script>
</body>
</html>
