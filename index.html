<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monika Play - Free Drag System</title>
    <style>
        body { background-color: #121213; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 0; touch-action: none; overflow: hidden; }
        .header { margin-top: 15px; font-size: 24px; font-weight: bold; color: #FFCC00; }
        #grid { 
            display: grid; grid-template-columns: repeat(8, 42px); grid-template-rows: repeat(8, 42px); 
            gap: 4px; background-color: #1a1a1b; padding: 10px; border-radius: 12px;
            margin: 10px auto; width: fit-content; border: 2px solid #333; position: relative;
        }
        .cell { width: 42px; height: 42px; background-color: #2c2c2e; border-radius: 6px; }
        .filled { background-color: #ff007f !important; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        #pieces-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; height: 140px; }
        .piece { position: relative; display: grid; gap: 3px; cursor: grab; z-index: 5; }
        .p-block { width: 35px; height: 35px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">SCORE: <span id="score">0</span></div>
    <div id="grid"></div>
    <div id="pieces-container"></div>

    <script>
        const gridElement = document.getElementById('grid');
        const piecesContainer = document.getElementById('pieces-container');
        const scoreElement = document.getElementById('score');
        let score = 0;
        let gridState = Array(64).fill(false);

        const shapes = [
            {data: [[1, 1], [1, 1]], color: '#00E5FF'},
            {data: [[1, 1, 1]], color: '#FFCC00'},
            {data: [[1], [1], [1]], color: '#A855F7'},
            {data: [[1, 0], [1, 1]], color: '#4ADE80'},
            {data: [[1]], color: '#FF007F'}
        ];

        function createGrid() {
            gridElement.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.id = `cell-${i}`;
                gridElement.appendChild(cell);
            }
        }

        function createPieces() {
            piecesContainer.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const shapeRef = shapes[Math.floor(Math.random() * shapes.length)];
                const pieceObj = document.createElement('div');
                pieceObj.classList.add('piece');
                pieceObj.style.gridTemplateColumns = `repeat(${shapeRef.data[0].length}, 38px)`;
                
                shapeRef.data.forEach((row, rIdx) => {
                    row.forEach((val, cIdx) => {
                        const b = document.createElement('div');
                        if (val) {
                            b.classList.add('p-block');
                            b.style.backgroundColor = shapeRef.color;
                            b.dataset.relRow = rIdx; // ब्लॉक के अंदर की स्थिति
                            b.dataset.relCol = cIdx;
                        } else {
                            b.style.visibility = 'hidden';
                        }
                        pieceObj.appendChild(b);
                    });
                });

                addTouchEvents(pieceObj, shapeRef.data);
                piecesContainer.appendChild(pieceObj);
            }
        }

        function addTouchEvents(piece, shape) {
            let offsetX, offsetY;

            piece.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                const rect = piece.getBoundingClientRect();
                // जहाँ छुआ है, वहाँ से ब्लॉक की दूरी (Offset) निकालें
                offsetX = touch.clientX - rect.left;
                offsetY = touch.clientY - rect.top;
                piece.style.zIndex = "100";
                piece.style.transform = "scale(1.1)";
            }, {passive: false});

            piece.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                piece.style.position = 'fixed';
                // उंगली जहाँ जा रही है, ब्लॉक वहीं रहेगा (पकड़ने वाली जगह से)
                piece.style.left = (touch.clientX - offsetX) + 'px';
                piece.style.top = (touch.clientY - offsetY) + 'px';
            }, {passive: false});

            piece.addEventListener('touchend', (e) => {
                const touch = e.changedTouches[0];
                piece.style.display = 'none';
                
                // यह चेक करें कि उंगली ठीक किस ब्लॉक (p-block) के ऊपर थी
                // हम उंगली के नीचे वाला ग्रिड सेल ढूंढेंगे
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                piece.style.display = 'grid';

                if (target && target.classList.contains('cell')) {
                    const cellId = parseInt(target.id.split('-')[1]);
                    const gridRow = Math.floor(cellId / 8);
                    const gridCol = cellId % 8;

                    // 'उंगली के नीचे वाले हिस्से' के आधार पर पूरे ब्लॉक का स्टार्ट पॉइंट निकालना
                    // मान लेते हैं कि उंगली ब्लॉक के जिस हिस्से पर थी, वो ग्रिड सेल पर गिरेगा
                    // यहाँ हम ब्लॉक के (0,0) को सही जगह फिट करने का लॉजिक लगा रहे हैं:
                    let startR = gridRow - Math.floor(offsetY / 40);
                    let startC = gridCol - Math.floor(offsetX / 40);

                    if (canPlace(startR, startC, shape)) {
                        placeShape(startR, startC, shape);
                        piece.remove();
                        checkLines();
                        if (piecesContainer.children.length === 0) createPieces();
                    } else {
                        resetPiece(piece);
                    }
                } else {
                    resetPiece(piece);
                }
            });
        }

        function resetPiece(piece) {
            piece.style.position = 'relative';
            piece.style.left = '0';
            piece.style.top = '0';
            piece.style.transform = 'scale(1)';
            piece.style.zIndex = "5";
        }

        function canPlace(startR, startC, shape) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        let currR = startR + r;
                        let currC = startC + c;
                        if (currR < 0 || currR >= 8 || currC < 0 || currC >= 8 || gridState[currR * 8 + currC]) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        function placeShape(startR, startC, shape) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) gridState[(startR + r) * 8 + (startC + c)] = true;
                }
            }
            updateUI();
        }

        function updateUI() {
            gridState.forEach((val, i) => {
                const cell = document.getElementById(`cell-${i}`);
                cell.className = val ? 'cell filled' : 'cell';
            });
        }

        function checkLines() {
            let toClear = [];
            for(let i=0; i<8; i++){
                let rFull=true, cFull=true;
                for(let j=0; j<8; j++){
                    if(!gridState[i*8+j]) rFull=false;
                    if(!gridState[j*8+i]) cFull=false;
                }
                if(rFull) for(let j=0; j<8; j++) toClear.push(i*8+j);
                if(cFull) for(let j=0; j<8; j++) toClear.push(j*8+i);
            }
            let unique = [...new Set(toClear)];
            unique.forEach(idx => gridState[idx] = false);
            if(unique.length > 0) {
                score += unique.length * 10;
                scoreElement.innerText = score;
                updateUI();
            }
        }

        createGrid();
        createPieces();
    </script>
</body>
</html>
