<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monika Play - Ultra Glow Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #ff007f; --secondary: #00E5FF; --bg: #020205; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: white; text-align: center; 
            font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh;
        }

        body::after {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at 20% 30%, #1a0033 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #001a33 0%, transparent 40%);
            z-index: -1; pointer-events: none;
        }

        #splash {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .loader-text { font-size: 50px; font-weight: 900; color: var(--primary); text-shadow: 0 0 20px var(--primary); animation: glow 1.5s infinite alternate; }
        @keyframes glow { from { opacity: 0.4; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        #home { display: none; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        .logo-main { font-size: 45px; font-weight: 900; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
        
        .card {
            width: 85%; max-width: 320px; padding: 30px; border-radius: 25px; margin-bottom: 20px;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.3s;
        }
        .card:active { transform: scale(0.95); }
        .c-classic { border-left: 6px solid var(--primary); }
        .c-level { border-left: 6px solid var(--secondary); }

        #game-ui { display: none; flex: 1; flex-direction: column; }
        .header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        
        #grid { 
            display: grid; grid-template-columns: repeat(8, 11.5%); gap: 1%; 
            background: rgba(255,255,255,0.03); padding: 10px; border-radius: 15px;
            width: 92%; margin: 0 auto; aspect-ratio: 1/1; border: 1px solid #333;
        }
        .cell { background: rgba(255,255,255,0.05); border-radius: 4px; transition: background 0.2s; }
        .filled { 
            background-color: var(--b-col) !important; 
            box-shadow: 0 0 15px var(--g-col), inset 0 0 5px rgba(255,255,255,0.5); 
            animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }

        #pieces { height: 160px; display: flex; justify-content: center; align-items: center; gap: 20px; padding-bottom: 20px; }
        .piece { display: grid; gap: 3px; z-index: 100; }
        .p-block { width: 28px; height: 28px; border-radius: 4px; }
        .is-bomb { background: #ffea00 !important; border-radius: 50% !important; animation: bPulse 0.5s infinite alternate; box-shadow: 0 0 20px #ffea00; }
        @keyframes bPulse { to { transform: scale(1.1); filter: brightness(1.3); } }

        .ovl { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 8000; }
        .popup { background: #111; padding: 40px; border-radius: 30px; border: 1px solid var(--primary); width: 80%; }
        .btn { padding: 15px 40px; border-radius: 50px; background: var(--primary); color: #fff; border: none; font-weight: bold; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div id="splash"><div class="loader-text">MONIKA PLAY</div></div>

    <div id="home">
        <div class="logo-main">MONIKA PLAY</div>
        <div class="card c-classic" onclick="start('classic')">
            <h2 style="color:var(--primary); margin:0;">CLASSIC</h2>
            <p style="font-size:12px; opacity:0.6;">Time Challenge • High Score</p>
        </div>
        <div class="card c-level" onclick="start('level')">
            <h2 style="color:var(--secondary); margin:0;">LEVELS</h2>
            <p style="font-size:12px; opacity:0.6;">Targets • Bombs • Fun</p>
        </div>
        <div id="main-high-score" style="margin-top:20px; font-size:14px; opacity:0.8;">Best: 0</div>
    </div>

    <div id="game-ui">
        <div class="header">
            <div id="m-text" style="font-weight:900;">MODE</div>
            <div id="timer-display">Time: 60s</div>
            <div>Score: <span id="score-val">0</span></div>
        </div>
        <div id="grid"></div>
        <div id="pieces"></div>
    </div>

    <div id="ovl" class="ovl">
        <div class="popup">
            <h1 id="ovl-t">LEVEL UP!</h1>
            <p id="ovl-d">You did great!</p>
            <button class="btn" onclick="location.reload()">HOME / RESTART</button>
        </div>
    </div>

    <script>
        let score = 0, mode = 'classic', level = 1, target = 500, grid = Array(64).fill(null);
        let piecesData = [], timeLeft = 60, timerInterval, gameActive = false;
        let highScore = localStorage.getItem("monikaHighScore") || 0;

        document.getElementById('main-high-score').innerText = "Best Score: " + highScore;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, dur) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }
        const sfx = {
            place: () => playSound(400, 'sine', 0.1),
            line: () => { playSound(600, 'square', 0.2); setTimeout(()=>playSound(800, 'square', 0.2), 50); },
            bomb: () => playSound(100, 'sawtooth', 0.4),
            fail: () => playSound(150, 'triangle', 0.5)
        };

        const shapes = [
            {d:[[1]]}, {d:[[1,1]]}, {d:[[1,1],[1,1]]}, {d:[[1,1,1]]}, 
            {d:[[1,1],[1,0]]}, {d:[[1,1,1],[0,1,0]]}, {d:[[1,1,1,1]]}
        ];
        const cols = [{b:'#ff007f',g:'rgba(255,0,127,0.5)'}, {b:'#00E5FF',g:'rgba(0,229,255,0.5)'}, {b:'#00FF7F',g:'rgba(0,255,127,0.5)'}];

        window.onload = () => setTimeout(() => {
            document.getElementById('splash').style.display='none';
            document.getElementById('home').style.display='flex';
        }, 2000);

        function start(m) {
            mode = m; gameActive = true; timeLeft = 60; score = 0;
            document.getElementById('home').style.display='none';
            document.getElementById('game-ui').style.display='flex';
            document.getElementById('m-text').innerText = mode.toUpperCase();
            document.getElementById('m-text').style.color = mode==='classic'?'var(--primary)':'var(--secondary)';
            init();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!gameActive) return;
                timeLeft--;
                document.getElementById('timer-display').innerText = `Time: ${timeLeft}s`;
                if(timeLeft <= 10) document.getElementById('timer-display').style.color = 'red';
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endGame("TIME UP!");
                }
            }, 1000);
        }

        function init() {
            grid.fill(null);
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=0; i<64; i++) {
                let c = document.createElement('div'); c.className = 'cell'; c.id = 'c-'+i; g.appendChild(c);
            }
            makePieces();
        }

        function makePieces() {
            const cont = document.getElementById('pieces'); cont.innerHTML = '';
            for(let i=0; i<3; i++) {
                let s = shapes[Math.floor(Math.random()*shapes.length)];
                if(mode==='level' && Math.random() < 0.2) s = {d:[['B']]};
                let c = cols[Math.floor(Math.random()*cols.length)];
                piecesData[i] = { s: s.d, c: c };
                let p = document.createElement('div'); p.className = 'piece'; p.id = 'p-'+i;
                drawP(p, s.d, c);
                drag(p, i);
                cont.appendChild(p);
            }
            checkEnd();
        }

        function drawP(el, sh, col) {
            el.style.gridTemplateColumns = `repeat(${sh[0].length}, 28px)`;
            sh.forEach(r => r.forEach(v => {
                let b = document.createElement('div'); b.className = 'p-block';
                if(v==='B') b.classList.add('is-bomb');
                else if(v) { b.style.background = col.b; b.style.boxShadow=`0 0 10px ${col.g}`; }
                else b.style.visibility = 'hidden';
                el.appendChild(b);
            }));
        }

        function drag(p, idx) {
            let sx, sy;
            p.ontouchstart = (e) => { sx = p.offsetWidth/2; sy = p.offsetHeight/2; p.style.transform="scale(1.2) translateY(-40px)"; };
            p.ontouchmove = (e) => {
                let t = e.touches[0];
                p.style.position='fixed'; p.style.left=(t.clientX-sx)+'px'; p.style.top=(t.clientY-sy-60)+'px';
            };
            p.ontouchend = (e) => {
                let r = p.getBoundingClientRect(); p.style.display='none';
                let tar = document.elementFromPoint(r.left+15, r.top+15); p.style.display='grid';
                if(tar && tar.classList.contains('cell')) {
                    let id = parseInt(tar.id.split('-')[1]), rr = Math.floor(id/8), cc = id%8;
                    if(piecesData[idx].s[0][0]==='B') { sfx.bomb(); explode(rr, cc); p.remove(); next(); }
                    else if(canPlace(rr, cc, piecesData[idx].s)) { sfx.place(); place(rr, cc, piecesData[idx].s, piecesData[idx].c); p.remove(); next(); }
                    else resetP(p);
                } else resetP(p);
            };
        }

        function explode(r, c) {
            for(let i=r-1; i<=r+1; i++) for(let j=c-1; j<=c+1; j++) if(i>=0&&i<8&&j>=0&&j<8) grid[i*8+j]=null;
            score += 50; update();
        }

        function canPlace(sr, sc, sh) {
            for(let r=0; r<sh.length; r++) for(let c=0; c<sh[r].length; c++) {
                if(sh[r][c]) { let cr=sr+r, cc=sc+c; if(cr>=8||cc>=8||grid[cr*8+cc]) return false; }
            } return true;
        }

        function place(sr, sc, sh, col) {
            for(let r=0; r<sh.length; r++) for(let c=0; c<sh[r].length; c++) if(sh[r][c]) grid[(sr+r)*8+(sc+c)]=col;
            score += 10; checkLines(); update();
        }

        function next() {
            if(document.getElementById('pieces').children.length === 0) makePieces();
            if(mode === 'level' && score >= target) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                level++; target += 500;
                timeLeft += 20; // बोनस टाइम
                showPop("LEVEL UP!", "Next Target: " + target + "\n+20s Bonus!");
            }
        }

        function checkLines() {
            let rs=[], cs=[];
            for(let i=0; i<8; i++) {
                let rf=true, cf=true;
                for(let j=0; j<8; j++) { if(!grid[i*8+j]) rf=false; if(!grid[j*8+i]) cf=false; }
                if(rf) rs.push(i); if(cf) cs.push(i);
            }
            if(rs.length || cs.length) sfx.line();
            rs.forEach(r => { for(let j=0; j<8; j++) grid[r*8+j]=null; });
            cs.forEach(c => { for(let j=0; j<8; j++) grid[j*8+c]=null; });
            score += (rs.length + cs.length) * 100;
        }

        function update() {
            document.getElementById('score-val').innerText = score;
            grid.forEach((v, i) => {
                let c = document.getElementById('c-'+i);
                if(v) { c.classList.add('filled'); c.style.setProperty('--b-col', v.b); c.style.setProperty('--g-col', v.g); }
                else { c.classList.remove('filled'); }
            });
        }

        function showPop(t, d) {
            document.getElementById('ovl-t').innerText = t; document.getElementById('ovl-d').innerText = d;
            document.getElementById('ovl').style.display='flex';
        }

        function endGame(reason) {
            gameActive = false;
            sfx.fail();
            if(score > highScore) {
                localStorage.setItem("monikaHighScore", score);
                showPop(reason, "NEW HIGH SCORE: " + score);
            } else {
                showPop(reason, "Final Score: " + score + "\nBest: " + highScore);
            }
        }

        function checkEnd() {
            let ok = false;
            document.querySelectorAll('.piece').forEach(p => {
                let idx = p.id.split('-')[1], sh = piecesData[idx].s;
                if(sh[0][0]==='B') ok = true;
                else for(let i=0; i<64; i++) if(canPlace(Math.floor(i/8), i%8, sh)) ok = true;
            });
            if(!ok && document.querySelectorAll('.piece').length > 0) endGame("NO MOVES LEFT");
        }

        function resetP(p) { p.style.position='relative'; p.style.left='0'; p.style.top='0'; p.style.transform="scale(1)"; }
    </script>
</body>
</html>
