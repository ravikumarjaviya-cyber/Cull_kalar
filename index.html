<?xml version="1.0" encoding="utf-8"?>
<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:padding="20dp">

    <TextView
        android:id="@+id/statusText"
        android:layout_width="wrap_content"
        android:layout_height="wrap_content"
        android:text="खेल शुरू करें!"
        android:textSize="20sp"
        android:layout_centerHorizontal="true"/>

    <GridLayout
        android:layout_width="300dp"
        android:layout_height="300dp"
        android:layout_centerInParent="true"
        android:columnCount="2"
        android:rowCount="2">
        <View android:layout_width="150dp" android:layout_height="150dp" android:background="#FF4444" />
        <View android:layout_width="150dp" android:layout_height="150dp" android:background="#44FF44" />
        <View android:layout_width="150dp" android:layout_height="150dp" android:background="#4444FF" />
        <View android:layout_width="150dp" android:layout_height="150dp" android:background="#FFFF44" />
    </GridLayout>

    <Button
        android:id="@+id/rollButton"
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:layout_alignParentBottom="true"
        android:text="पासा फेंको" />
</RelativeLayout>package com.jassu.ludogame;

import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.TextView;
import androidx.appcompat.app.AppCompatActivity;
import java.util.Random;

public class MainActivity extends AppCompatActivity {

    int playerPosition = 0; // खिलाड़ी की शुरुआती जगह
    int winningPoint = 56; // जीतने के लिए कुल कदम

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        final Button rollButton = findViewById(R.id.rollButton);
        final TextView statusText = findViewById(R.id.statusText);

        rollButton.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View v) {
                // 1. पासा फेंकना
                Random random = new Random();
                int diceValue = random.nextInt(6) + 1;

                // 2. गोटी को आगे बढ़ाना
                if (playerPosition + diceValue <= winningPoint) {
                    playerPosition += diceValue;
                    statusText.setText("पासा: " + diceValue + " | स्थिति: " + playerPosition);
                }

                // 3. जीत की जाँच
                if (playerPosition == winningPoint) {
                    statusText.setText("बधाई हो जस्सू! आप जीत गईं!");
                    rollButton.setEnabled(false);
                }
            }
        });
    }
}
