<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monika Play - Precision Edition</title>
    <style>
        :root {
            --primary: #ff007f;
            --bg-dark: #0a0a0b;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            text-align: center; 
            font-family: sans-serif; 
            margin: 0; padding: 0; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        .header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .title { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: 2px; }

        #game-area { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; }
        
        #grid { 
            display: grid; grid-template-columns: repeat(8, 1fr);
            gap: 4px; background: rgba(255,255,255,0.05);
            padding: 8px; border-radius: 12px;
            width: 100%; max-width: 360px; aspect-ratio: 1/1;
        }

        .cell { background: rgba(255,255,255,0.05); border-radius: 4px; }
        .filled { background-color: var(--block-color) !important; box-shadow: 0 0 10px var(--glow-color); }

        #pieces-container { height: 150px; display: flex; justify-content: center; align-items: center; gap: 20px; }
        
        .piece { display: grid; gap: 2px; cursor: grab; position: relative; }
        .p-block { border-radius: 3px; width: 30px; height: 30px; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }

        .modal-box { background: #1a1a1a; padding: 30px; border-radius: 20px; width: 80%; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="loginOverlay" class="overlay">
        <div class="modal-box">
            <h2 style="color:var(--primary)">MONIKA PLAY</h2>
            <button class="btn" onclick="doLogin()">गेम शुरू करें</button>
        </div>
    </div>

    <div class="header">
        <div class="title">MONIKA PLAY</div>
        <div style="font-size: 14px; margin-top: 5px;">Score: <span id="score">0</span> | Best: <span id="highScore">0</span></div>
    </div>

    <div id="game-area"><div id="grid"></div></div>
    <div id="pieces-container"></div>

    <script>
        let score = 0;
        let gridState = Array(64).fill(null);
        let currentPiecesData = [null, null, null];

        window.onload = () => {
            if (!localStorage.getItem('monikaLoggedIn')) {
                document.getElementById('loginOverlay').style.display = 'flex';
            } else { initGame(); }
        };

        function doLogin() {
            localStorage.setItem('monikaLoggedIn', 'true');
            document.getElementById('loginOverlay').style.display = 'none';
            initGame();
        }

        function initGame() {
            document.getElementById('highScore').innerText = localStorage.getItem('monikaBest') || 0;
            createGrid();
            createPieces();
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<64; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell'; cell.id = 'cell-'+i;
                grid.appendChild(cell);
            }
        }

        const colors = [
            { bg: '#ff007f', glow: 'rgba(255, 0, 127, 0.5)' },
            { bg: '#00FF7F', glow: 'rgba(0, 255, 127, 0.5)' },
            { bg: '#00E5FF', glow: 'rgba(0, 229, 255, 0.5)' }
        ];

        const shapes = [
            {data:[[1,1],[1,1]]}, {data:[[1,1,1]]}, {data:[[1]]}, {data:[[1,1],[1,0]]}
        ];

        function createPieces() {
            const container = document.getElementById('pieces-container');
            container.innerHTML = '';
            for(let i=0; i<3; i++) {
                let shape = shapes[Math.floor(Math.random()*shapes.length)];
                let color = colors[Math.floor(Math.random()*colors.length)];
                currentPiecesData[i] = { shape: shape.data, color: color };
                
                let p = document.createElement('div');
                p.className = 'piece'; p.setAttribute('data-idx', i);
                p.style.gridTemplateColumns = `repeat(${shape.data[0].length}, 30px)`;
                
                shape.data.forEach(row => row.forEach(v => {
                    let b = document.createElement('div');
                    b.className = 'p-block';
                    if(v) { b.style.background = color.bg; } else { b.style.visibility = 'hidden'; }
                    p.appendChild(b);
                }));
                addTouchEvents(p, shape.data, color);
                container.appendChild(p);
            }
        }

        function addTouchEvents(p, sh, col) {
            let startX, startY;
            
            p.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                const rect = p.getBoundingClientRect();
                // सटीक सेंटर कैलकुलेशन
                startX = touch.clientX - rect.left;
                startY = touch.clientY - rect.top;
                p.style.zIndex = "1000";
                p.style.transform = "scale(1.1)";
            });

            p.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                p.style.position = 'fixed';
                // उंगली के बिल्कुल नीचे ब्लॉक रखने के लिए
                p.style.left = (touch.clientX - startX) + 'px';
                p.style.top = (touch.clientY - startY - 40) + 'px'; 
            });

            p.addEventListener('touchend', (e) => {
                p.style.display = 'none';
                const touch = e.changedTouches[0];
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                p.style.display = 'grid';

                if (target && target.classList.contains('cell')) {
                    const id = parseInt(target.id.split('-')[1]);
                    const r = Math.floor(id / 8);
                    const c = id % 8;

                    if (canPlace(r, c, sh)) {
                        place(r, c, sh, col);
                        p.remove();
                        checkLines();
                        if (document.getElementById('pieces-container').children.length === 0) createPieces();
                    } else { resetPiece(p); }
                } else { resetPiece(p); }
            });
        }

        function canPlace(sr, sc, sh) {
            for(let r=0; r<sh.length; r++) {
                for(let c=0; c<sh[r].length; c++) {
                    if(sh[r][c]) {
                        let cr = sr + r, cc = sc + c;
                        if(cr >= 8 || cc >= 8 || gridState[cr*8+cc]) return false;
                    }
                }
            } return true;
        }

        function place(sr, sc, sh, col) {
            for(let r=0; r<sh.length; r++) {
                for(let c=0; c<sh[r].length; c++) {
                    if(sh[r][c]) gridState[(sr+r)*8+(sc+c)] = col;
                }
            }
            updateUI();
        }

        function checkLines() {
            let toClear = new Set();
            for(let i=0; i<8; i++) {
                let rowFull=true, colFull=true;
                for(let j=0; j<8; j++) {
                    if(!gridState[i*8+j]) rowFull=false;
                    if(!gridState[j*8+i]) colFull=false;
                }
                if(rowFull) for(let j=0; j<8; j++) toClear.add(i*8+j);
                if(colFull) for(let j=0; j<8; j++) toClear.add(j*8+i);
            }
            if(toClear.size > 0) {
                toClear.forEach(idx => gridState[idx] = null);
                score += toClear.size * 10;
                document.getElementById('score').innerText = score;
                updateUI();
            }
        }

        function updateUI() {
            gridState.forEach((v, i) => {
                const cell = document.getElementById('cell-'+i);
                if(v) {
                    cell.classList.add('filled');
                    cell.style.setProperty('--block-color', v.bg);
                    cell.style.setProperty('--glow-color', v.glow);
                } else { cell.classList.remove('filled'); cell.style.background = ""; }
            });
        }

        function resetPiece(p) {
            p.style.position = 'relative';
            p.style.left = '0'; p.style.top = '0';
            p.style.transform = "scale(1)";
        }
    </script>
</body>
</html>
