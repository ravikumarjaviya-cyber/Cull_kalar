<!DOCTYPE html>
<html>
<head>
    <title>इस्कॉन बुक्स ऐप</title>
    <style>
        body { font-family: Arial; text-align: center; background-color: #fff5e6; }
        .book-card { border: 1px solid #d4a373; padding: 20px; margin: 10px; display: inline-block; border-radius: 10px; background: white; }
        button { background-color: #fb8500; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>हरे कृष्णा! इस्कॉन लाइब्रेरी</h1>
    
    <div class="book-card">
        <h3>भगवद गीता (यथारूप)</h3>
        <p>लेखक: श्रील प्रभुपाद</p>
        <button onclick="alert('किताब खुल रही है...')">पढ़ना शुरू करें</button>
    </div>

    <div class="book-card">
        <h3>ईशोपनिषद</h3>
        <p>आध्यात्मिक ज्ञान का सार</p>
        <button onclick="alert('किताब डाउनलोड हो रही है...')">डाउनलोड करें</button>
    </div>
</body>
</html>
