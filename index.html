<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monika Play - Music Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #121213; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 0; touch-action: none; overflow: hidden; }
        .header-container { padding: 15px; background: #1a1a1b; border-bottom: 2px solid #333; margin-bottom: 10px; position: relative; }
        .score-box { display: flex; justify-content: space-around; font-size: 18px; font-weight: bold; }
        .score-label { color: #FFCC00; }
        .high-score-label { color: #4ADE80; }
        
        /* म्यूजिक बटन स्टाइल */
        #musicToggle {
            position: absolute; right: 10px; top: 10px; background: #333; color: white;
            border: 1px solid #555; border-radius: 50%; width: 35px; height: 35px;
            font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        #grid { 
            display: grid; grid-template-columns: repeat(8, 42px); grid-template-rows: repeat(8, 42px); 
            gap: 4px; background-color: #1a1a1b; padding: 10px; border-radius: 12px;
            margin: 5px auto; width: fit-content; border: 2px solid #333; position: relative;
        }
        .cell { width: 42px; height: 42px; background-color: #2c2c2e; border-radius: 6px; transition: all 0.2s; }
        .filled { background-color: #ff007f !important; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        
        #pieces-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; height: 130px; }
        .piece { position: relative; display: grid; gap: 3px; cursor: grab; z-index: 5; }
        .p-block { width: 35px; height: 35px; border-radius: 5px; pointer-events: none; }

        #forceGameOverBtn {
            margin-top: 15px; padding: 12px 30px; font-size: 16px; font-weight: bold;
            background: linear-gradient(145deg, #e74c3c, #c0392b); color: white;
            border: none; border-radius: 25px; cursor: pointer;
        }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .modal { background: #1a1a1b; padding: 40px; border-radius: 20px; border: 3px solid #ff007f; text-align: center; }
        .restart-btn { background: #4ADE80; color: black; padding: 12px 25px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header-container">
        <button id="musicToggle" onclick="toggleMusic()">🔇</button>
        <div style="font-size: 22px; margin-bottom: 5px;">MONIKA PLAY 🎵</div>
        <div class="score-box">
            <div><span class="score-label">SCORE:</span> <span id="score">0</span></div>
            <div><span class="high-score-label">BEST:</span> <span id="highScore">0</span></div>
        </div>
    </div>

    <div id="grid"></div>
    <div id="pieces-container"></div>
    <button id="forceGameOverBtn" onclick="triggerGameOver()">GAME OVER</button>

    <div id="overlay">
        <div class="modal">
            <h1 id="overTitle" style="color: #ff007f; margin: 0;">खेल समाप्त!</h1>
            <p style="font-size: 22px; margin: 20px 0 10px 0;">स्कोर: <span id="finalScore">0</span></p>
            <p id="highScoreMsg" style="color: #4ADE80; font-weight: bold; display:none;">🎉 नया रिकॉर्ड! 🎉</p>
            <button class="restart-btn" onclick="location.reload()">फिर से खेलें</button>
        </div>
    </div>

    <script>
        // साउंड्स
        const popSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const winSound = new Audio('https://actions.google.com/sounds/v1/foley/wind_chime.ogg');
        
        // बैकग्राउंड म्यूजिक (Lofi)
        const bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); 
        bgMusic.loop = true;
        bgMusic.volume = 0.3; // आवाज़ थोड़ी कम ताकि डिस्टर्ब न करे

        let musicPlaying = false;
        function toggleMusic() {
            const btn = document.getElementById('musicToggle');
            if (!musicPlaying) {
                bgMusic.play();
                btn.innerText = "🔊";
                musicPlaying = true;
            } else {
                bgMusic.pause();
                btn.innerText = "🔇";
                musicPlaying = false;
            }
        }

        const gridElement = document.getElementById('grid');
        const piecesContainer = document.getElementById('pieces-container');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const overlay = document.getElementById('overlay');
        
        let score = 0;
        let highScore = localStorage.getItem('monikaHighScore') || 0;
        let gridState = Array(64).fill(false);
        let isGameOver = false;

        highScoreElement.innerText = highScore;

        const shapes = [
            {data: [[1, 1], [1, 1]], color: '#00E5FF'},
            {data: [[1, 1, 1]], color: '#FFCC00'},
            {data: [[1], [1], [1]], color: '#A855F7'},
            {data: [[1, 0], [1, 1]], color: '#4ADE80'},
            {data: [[1]], color: '#FF007F'}
        ];

        function createGrid() {
            gridElement.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.id = `cell-${i}`;
                gridElement.appendChild(cell);
            }
        }

        function createPieces() {
            if(isGameOver) return;
            piecesContainer.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const shapeRef = shapes[Math.floor(Math.random() * shapes.length)];
                const pieceObj = document.createElement('div');
                pieceObj.classList.add('piece');
                pieceObj.style.gridTemplateColumns = `repeat(${shapeRef.data[0].length}, 38px)`;
                shapeRef.data.forEach((row) => {
                    row.forEach((val) => {
                        const b = document.createElement('div');
                        if (val) { b.classList.add('p-block'); b.style.backgroundColor = shapeRef.color; }
                        else { b.style.visibility = 'hidden'; }
                        pieceObj.appendChild(b);
                    });
                });
                addTouchEvents(pieceObj, shapeRef.data);
                piecesContainer.appendChild(pieceObj);
            }
        }

        function addTouchEvents(piece, shape) {
            let offsetX, offsetY;
            piece.addEventListener('touchstart', (e) => {
                if(isGameOver) return;
                // पहली बार छूने पर म्यूजिक शुरू करने का प्रयास (Browser नियम के लिए)
                if(!musicPlaying && bgMusic.paused) { /* म्यूजिक चालू करने के लिए यूजर बटन दबाए */ }
                
                const touch = e.touches[0];
                const rect = piece.getBoundingClientRect();
                offsetX = touch.clientX - rect.left;
                offsetY = touch.clientY - rect.top;
                piece.style.zIndex = "100";
                piece.style.transform = "scale(1.2)";
            });
            piece.addEventListener('touchmove', (e) => {
                if(isGameOver) return;
                e.preventDefault();
                const touch = e.touches[0];
                piece.style.position = 'fixed';
                piece.style.left = (touch.clientX - offsetX) + 'px';
                piece.style.top = (touch.clientY - offsetY) + 'px';
            });
            piece.addEventListener('touchend', (e) => {
                if(isGameOver) return;
                const touch = e.changedTouches[0];
                piece.style.display = 'none';
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                piece.style.display = 'grid';
                if (target && target.classList.contains('cell')) {
                    const cellId = parseInt(target.id.split('-')[1]);
                    let startR = Math.floor(cellId / 8) - Math.floor(offsetY / 42);
                    let startC = (cellId % 8) - Math.floor(offsetX / 42);
                    if (canPlace(startR, startC, shape)) {
                        placeShape(startR, startC, shape);
                        piece.remove();
                        checkLines();
                        if (piecesContainer.children.length === 0) createPieces();
                    } else { resetPiece(piece); }
                } else { resetPiece(piece); }
            });
        }

        function checkLines() {
            let toClear = [];
            for(let i=0; i<8; i++){
                let rFull=true, cFull=true;
                for(let j=0; j<8; j++){
                    if(!gridState[i*8+j]) rFull=false;
                    if(!gridState[j*8+i]) cFull=false;
                }
                if(rFull) for(let j=0; j<8; j++) toClear.push(i*8+j);
                if(cFull) for(let j=0; j<8; j++) toClear.push(j*8+i);
            }
            let unique = [...new Set(toClear)];
            if(unique.length > 0) {
                popSound.currentTime = 0; popSound.play();
                unique.forEach(idx => gridState[idx] = false);
                score += unique.length * 10;
                scoreElement.innerText = score;
                updateUI();
            }
        }

        function triggerGameOver() {
            isGameOver = true;
            bgMusic.pause(); // गेम ओवर होने पर म्यूजिक बंद
            document.getElementById('finalScore').innerText = score;
            if (score > highScore) {
                localStorage.setItem('monikaHighScore', score);
                document.getElementById('highScoreMsg').style.display = 'block';
                document.getElementById('overTitle').innerText = "बधाई हो रवि!";
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                winSound.play();
            }
            overlay.style.display = 'flex';
        }

        function resetPiece(piece) {
            piece.style.position = 'relative';
            piece.style.left = '0'; piece.style.top = '0';
            piece.style.transform = 'scale(1)'; piece.style.zIndex = "5";
        }

        function canPlace(startR, startC, shape) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        let currR = startR + r;
                        let currC = startC + c;
                        if (currR < 0 || currR >= 8 || currC < 0 || currC >= 8 || gridState[currR * 8 + currC]) return false;
                    }
                }
            }
            return true;
        }

        function placeShape(startR, startC, shape) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) gridState[(startR + r) * 8 + (startC + c)] = true;
                }
            }
            updateUI();
        }

        function updateUI() {
            gridState.forEach((val, i) => {
                const cell = document.getElementById(`cell-${i}`);
                cell.className = val ? 'cell filled' : 'cell';
            });
        }

        createGrid();
        createPieces();
    </script>
</body>
</html>
