<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monika Play - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #ff007f; --secondary: #00E5FF; --bg: #020205; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        
        body { 
            background: var(--bg); color: white; text-align: center; 
            font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh;
        }

        body::after {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at 20% 30%, #1a0033 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #001a33 0%, transparent 40%);
            z-index: -1; pointer-events: none;
        }

        /* Splash Screen */
        #splash {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .loader-text { font-size: 45px; font-weight: 900; color: var(--primary); text-shadow: 0 0 20px var(--primary); animation: glow 1.5s infinite alternate; }
        @keyframes glow { from { opacity: 0.4; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* Home Screen */
        #home { display: none; flex-direction: column; justify-content: center; align-items: center; height: calc(100vh - 70px); }
        .logo-main { font-size: 40px; font-weight: 900; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        
        .card {
            width: 85%; max-width: 300px; padding: 25px; border-radius: 20px; margin-bottom: 15px;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.3s;
        }
        .c-classic { border-left: 6px solid var(--primary); }
        .c-level { border-left: 6px solid var(--secondary); }

        /* Game UI */
        #game-ui { display: none; flex: 1; flex-direction: column; padding-bottom: 80px; }
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: bold; }
        
        #grid { 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; 
            background: rgba(255,255,255,0.03); padding: 8px; border-radius: 12px;
            width: 92%; margin: 0 auto; aspect-ratio: 1/1; border: 1px solid #333;
        }
        .cell { background: rgba(255,255,255,0.05); border-radius: 4px; height: 100%; width: 100%; }
        .filled { 
            background-color: var(--b-col) !important; 
            box-shadow: 0 0 12px var(--g-col); 
            animation: pop 0.2s ease-out;
        }
        @keyframes pop { 0% { transform: scale(0.7); } 100% { transform: scale(1); } }

        #pieces { height: 140px; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .piece { display: grid; gap: 3px; z-index: 100; transition: transform 0.1s; }
        .p-block { width: 26px; height: 26px; border-radius: 4px; }
        .is-bomb { background: #ffea00 !important; border-radius: 50% !important; animation: bPulse 0.5s infinite alternate; }
        @keyframes bPulse { to { transform: scale(1.1); filter: brightness(1.2); } }

        /* Overlay */
        .ovl { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 8000; }
        .popup { background: #111; padding: 30px; border-radius: 25px; border: 1px solid var(--primary); width: 80%; }
        .btn { padding: 12px; border-radius: 50px; background: var(--primary); color: #fff; border: none; font-weight: bold; margin-top: 15px; width: 100%; }

        /* Ad Banner */
        #ad-banner {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: #000; border-top: 1px solid #333; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="splash"><div class="loader-text">MONIKA PLAY</div></div>

    <div id="home">
        <div class="logo-main">MONIKA PLAY</div>
        <div class="card c-classic" onclick="start('classic')">
            <h2 style="color:var(--primary); margin:0;">CLASSIC</h2>
            <p style="font-size:12px; opacity:0.7;">No Timer • Progressive Difficulty</p>
        </div>
        <div class="card c-level" onclick="start('level')">
            <h2 style="color:var(--secondary); margin:0;">LEVELS</h2>
            <p style="font-size:12px; opacity:0.7;">1 Min Timer • Bombs</p>
        </div>
        <div id="high-score-text" style="color:var(--secondary); font-size:14px;">Best: 0</div>
    </div>

    <div id="game-ui">
        <div class="header">
            <div id="m-label">MODE</div>
            <div id="timer-val" style="color:var(--secondary)"></div>
            <div>Score: <span id="cur-score">0</span></div>
        </div>
        <div id="grid"></div>
        <div id="pieces"></div>
    </div>

    <div id="ovl" class="ovl">
        <div class="popup">
            <h1 id="ovl-title">GAME OVER</h1>
            <p id="ovl-body"></p>
            <button class="btn" onclick="location.reload()">RESTART</button>
        </div>
    </div>

    <div id="ad-banner" onclick="handleAdClick()">
        <img id="ad-img" src="" style="width:100%; height:100%; object-fit: contain;">
    </div>

    <script>
        let grid = Array(64).fill(null), score = 0, gameActive = false, mode = 'classic';
        let timeLeft = 60, timerId = null, target = 500, currentPieces = [];
        let bestScore = localStorage.getItem("monika_best") || 0;

        document.getElementById('high-score-text').innerText = "Best: " + bestScore;

        const ads = [
            {img: "https://via.placeholder.com/320x50/ff007f/ffffff?text=Play+More+Games", link: "#"},
            {img: "https://via.placeholder.com/320x50/00e5ff/000000?text=Visit+Our+App+Store", link: "#"}
        ];
        let adIdx = 0;
        function rotateAds() {
            const img = document.getElementById('ad-img');
            img.src = ads[adIdx].img;
            adIdx = (adIdx + 1) % ads.length;
        }
        setInterval(rotateAds, 8000); rotateAds();
        function handleAdClick() { window.open(ads[adIdx].link, '_blank'); }

        const shapes = [
            {d:[[1]]}, {d:[[1,1]]}, {d:[[1,1],[1,1]]}, {d:[[1,1,1]]}, {d:[[1,1,1,1]]}, {d:[[1,1],[1,0]]}
        ];
        const colors = [{b:'#ff007f',g:'rgba(255,0,127,0.4)'}, {b:'#00e5ff',g:'rgba(0,229,255,0.4)'}, {b:'#00ff7f',g:'rgba(0,255,127,0.4)'}];

        window.onload = () => setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('home').style.display = 'flex';
        }, 1500);

        function start(m) {
            mode = m; gameActive = true; score = 0;
            document.getElementById('home').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            document.getElementById('m-label').innerText = mode.toUpperCase();
            
            if(mode === 'level') {
                timeLeft = 60;
                document.getElementById('timer-val').innerText = "60s";
                timerId = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer-val').innerText = timeLeft + "s";
                    if(timeLeft <= 0) endGame("TIME UP!");
                }, 1000);
            }
            initGrid();
        }

        function initGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            for(let i=0; i<64; i++) {
                let d = document.createElement('div');
                d.className = 'cell'; d.id = 'cell-' + i;
                container.appendChild(d);
            }
            spawnPieces();
        }

        function spawnPieces() {
            const container = document.getElementById('pieces');
            container.innerHTML = '';
            currentPieces = [];
            for(let i=0; i<3; i++) {
                let s = shapes[Math.floor(Math.random()*shapes.length)];
                if(mode === 'level' && Math.random() < 0.15) s = {d:[['B']]};
                let c = colors[Math.floor(Math.random()*colors.length)];
                currentPieces[i] = {s: s.d, c: c};
                
                let p = document.createElement('div');
                p.className = 'piece'; p.id = 'piece-' + i;
                p.style.gridTemplateColumns = `repeat(${s.d[0].length}, 26px)`;
                
                s.d.forEach(row => row.forEach(val => {
                    let b = document.createElement('div');
                    b.className = 'p-block';
                    if(val === 'B') b.classList.add('is-bomb');
                    else if(val) { b.style.background = c.b; b.style.boxShadow = `0 0 8px ${c.g}`; }
                    else b.style.visibility = 'hidden';
                    p.appendChild(b);
                }));
                setupDrag(p, i);
                container.appendChild(p);
            }
        }

        function setupDrag(p, idx) {
            let ox, oy;
            p.ontouchstart = (e) => {
                const t = e.touches[0];
                ox = p.offsetWidth / 2; oy = p.offsetHeight / 2;
                p.style.transform = "scale(1.2)";
            };
            p.ontouchmove = (e) => {
                const t = e.touches[0];
                p.style.position = 'fixed';
                p.style.left = (t.clientX - ox) + 'px';
                p.style.top = (t.clientY - oy - 50) + 'px';
            };
            p.ontouchend = (e) => {
                const r = p.getBoundingClientRect();
                p.style.display = 'none';
                const targetEl = document.elementFromPoint(r.left + ox, r.top + oy);
                p.style.display = 'grid';
                
                if(targetEl && targetEl.id.startsWith('cell-')) {
                    const id = parseInt(targetEl.id.split('-')[1]);
                    const row = Math.floor(id/8), col = id%8;
                    const piece = currentPieces[idx];
                    
                    if(piece.s[0][0] === 'B') {
                        handleExplosion(row, col); p.remove(); checkRound();
                    } else if(canFit(row, col, piece.s)) {
                        placePiece(row, col, piece.s, piece.c); p.remove(); checkRound();
                    } else resetPiece(p);
                } else resetPiece(p);
            };
        }

        function canFit(r, c, s) {
            for(let i=0; i<s.length; i++) for(let j=0; j<s[i].length; j++) {
                if(s[i][j]) {
                    let nr = r+i, nc = c+j;
                    if(nr >= 8 || nc >= 8 || grid[nr*8+nc]) return false;
                }
            } return true;
        }

        function placePiece(r, c, s, color) {
            for(let i=0; i<s.length; i++) for(let j=0; j<s[i].length; j++) {
                if(s[i][j]) grid[(r+i)*8 + (c+j)] = color;
            }
            score += 10; clearLines(); render();
        }

        function handleExplosion(r, c) {
            for(let i=r-1; i<=r+1; i++) for(let j=c-1; j<=c+1; j++) {
                if(i>=0 && i<8 && j>=0 && j<8) grid[i*8+j] = null;
            }
            score += 30; render();
        }

        function clearLines() {
            let rowsToClear = [], colsToClear = [];
            for(let i=0; i<8; i++) {
                let rFull = true, cFull = true;
                for(let j=0; j<8; j++) {
                    if(!grid[i*8+j]) rFull = false;
                    if(!grid[j*8+i]) cFull = false;
                }
                if(rFull) rowsToClear.push(i);
                if(cFull) colsToClear.push(i);
            }
            rowsToClear.forEach(r => { for(let j=0; j<8; j++) grid[r*8+j] = null; });
            colsToClear.forEach(c => { for(let j=0; j<8; j++) grid[j*8+c] = null; });
            score += (rowsToClear.length + colsToClear.length) * 100;
        }

        function render() {
            document.getElementById('cur-score').innerText = score;
            grid.forEach((val, i) => {
                const el = document.getElementById('cell-' + i);
                if(val) {
                    el.classList.add('filled');
                    el.style.setProperty('--b-col', val.b);
                    el.style.setProperty('--g-col', val.g);
                } else el.classList.remove('filled');
            });
        }

        function checkRound() {
            if(document.getElementById('pieces').children.length === 0) {
                spawnPieces();
                if(mode === 'level' && score >= target) {
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                    target += 500; timeLeft += 15;
                }
            }
        }

        function endGame(reason) {
            gameActive = false; clearInterval(timerId);
            if(score > bestScore) localStorage.setItem("monika_best", score);
            document.getElementById('ovl-title').innerText = reason;
            document.getElementById('ovl-body').innerText = "Final Score: " + score;
            document.getElementById('ovl').style.display = 'flex';
        }

        function resetPiece(p) { p.style.position='static'; p.style.transform="scale(1)"; }
    </script>
</body>
</html>
